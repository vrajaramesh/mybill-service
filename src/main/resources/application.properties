# ── Database (common) ──────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Database (cloud - overridden by k8s secrets in GKE) ────────
spring.datasource.url=jdbc:postgresql://35.200.161.254:5432/mybill?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=MyBill@123

# ── Schema init (runs init-public-schema.sql on every startup) ─
# Safe to run repeatedly — all statements use IF NOT EXISTS
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:init-public-schema.sql
# Ensure SQL init runs before Hibernate entity manager initializes
spring.jpa.defer-datasource-initialization=true

# ── CORS ───────────────────────────────────────────────────────
app.cors.allowed-origins=*

# ── JWT ────────────────────────────────────────────────────────
app.jwt.secret=mybill-super-secret-key-change-this-in-production-min32chars
app.jwt.expiry-days=7

# ── OpenAI (used only for DALL-E image generation) ─────────────
openai.api.key=

# ── Gemini (used for vision analysis - free tier) ──────────────
gemini.api.key=

