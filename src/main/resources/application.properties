# ── Database (common) ──────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Database (cloud - overridden by k8s secrets in GKE) ────────
spring.datasource.url=jdbc:postgresql://34.170.148.94:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=Vrrvt50707

# ── File upload limits ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── Schema init (runs init-public-schema.sql on every startup) ─
# Safe to run repeatedly — all statements use IF NOT EXISTS
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:init-public-schema.sql
# Ensure SQL init runs before Hibernate entity manager initializes
spring.jpa.defer-datasource-initialization=true

